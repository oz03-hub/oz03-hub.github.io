<style>
.gallery-carousel {
  position: relative;
  margin: 2rem 0;
  border: 1px solid var(--color-border, #333);
  border-radius: var(--radius, 8px);
  overflow: hidden;
  background: var(--color-bg-subtle, #111);
}

.gallery-viewport {
  overflow: hidden;
}

.gallery-track {
  display: flex;
  transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  will-change: transform;
}

.gallery-slide {
  min-width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  aspect-ratio: 4 / 3;
  background: var(--color-bg-subtle, #111);
}

.gallery-slide img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  display: block;
}

.gallery-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0, 0, 0, 0.5);
  color: #fff;
  border: none;
  font-size: 2rem;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, opacity 0.2s;
  opacity: 0.7;
  line-height: 1;
}

.gallery-btn:hover {
  background: var(--color-accent, #fb923c);
  opacity: 1;
}

.gallery-prev { left: 12px; }
.gallery-next { right: 12px; }

.gallery-counter {
  text-align: center;
  padding: 0.75rem 0;
  font-size: 0.85rem;
  color: var(--color-text-muted, #888);
  font-variant-numeric: tabular-nums;
}
</style>

<script>
(function() {
  var track = document.getElementById('galleryTrack');
  var counter = document.getElementById('galleryCounter');
  var total = track.children.length;
  var current = 0;

  function go(i) {
    current = (i % total + total) % total;
    track.style.transform = 'translateX(-' + (current * 100) + '%)';
    counter.textContent = (current + 1) + ' / ' + total;
  }

  go(0);

  document.getElementById('galleryPrev').addEventListener('click', function() { go(current - 1); });
  document.getElementById('galleryNext').addEventListener('click', function() { go(current + 1); });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowLeft') go(current - 1);
    if (e.key === 'ArrowRight') go(current + 1);
  });
})();
</script>
